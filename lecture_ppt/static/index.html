<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의 → PPT 생성기</title>
  <style>
    :root { --accent: #2e5bff; --dark: #1a1a2e; --gray: #666; --bg: #f5f6fa; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Apple SD Gothic Neo", sans-serif;
           background: var(--bg); color: var(--dark); }
    header { background: var(--dark); color: #fff; padding: 20px 28px; }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 4px 0 0; color: #aab; font-size: 13px; }
    main { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid;
           grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 860px) { main { grid-template-columns: 1fr; } }
    .card { background: #fff; border-radius: 12px; padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    textarea { width: 100%; height: 340px; padding: 12px; font-size: 14px;
               border: 1px solid #ddd; border-radius: 8px; resize: vertical;
               font-family: inherit; }
    .row { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
    label { font-size: 13px; color: var(--gray); }
    input[type=number] { width: 70px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; }
    button { background: var(--accent); color: #fff; border: 0; padding: 10px 18px;
             border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    button.ghost { background: #fff; color: var(--accent); border: 1px solid var(--accent); }
    .status { margin-top: 12px; font-size: 13px; color: var(--gray); min-height: 18px; }
    .status.err { color: #c0392b; }
    .slide { border: 1px solid #e4e4ee; border-radius: 8px; padding: 14px 16px;
             margin-bottom: 12px; }
    .slide .badge { display: inline-block; font-size: 11px; padding: 2px 8px;
                    border-radius: 10px; background: #eef1ff; color: var(--accent); }
    .slide h3 { margin: 8px 0 6px; font-size: 16px; }
    .slide ul { margin: 6px 0 0 18px; padding: 0; font-size: 13px; color: #333; }
    .slide .cols { display: flex; gap: 16px; }
    .slide .cols ul { flex: 1; }
    .slide .notes { margin-top: 8px; font-size: 12px; color: var(--gray);
                    border-top: 1px dashed #e4e4ee; padding-top: 6px; }
    .empty { color: #aaa; font-size: 14px; text-align: center; padding: 60px 0; }
  </style>
</head>
<body>
  <header>
    <h1>강의 → PPT 생성기</h1>
    <p>수업 내용을 붙여넣으면 Claude가 정리해 슬라이드로 만들고, .pptx로 내려받을 수 있습니다.</p>
  </header>
  <main>
    <section class="card">
      <textarea id="input" placeholder="여기에 수업 내용(텍스트 또는 마크다운)을 붙여넣으세요..."></textarea>
      <div class="row">
        <label>최대 슬라이드 수 <input type="number" id="maxSlides" value="15" min="3" max="40" /></label>
        <button id="genBtn">슬라이드 생성</button>
      </div>
      <div class="status" id="status"></div>
    </section>
    <section class="card">
      <div class="row" style="justify-content: space-between; margin-top: 0;">
        <strong id="deckTitle">미리보기</strong>
        <button class="ghost" id="dlBtn" disabled>.pptx 다운로드</button>
      </div>
      <div id="preview"><div class="empty">아직 생성된 슬라이드가 없습니다.</div></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    let currentDeck = null;

    function esc(s) {
      return (s || "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    }

    function renderDeck(deck) {
      $("deckTitle").textContent = deck.title || "미리보기";
      const el = $("preview");
      el.innerHTML = "";
      deck.slides.forEach((s, i) => {
        const div = document.createElement("div");
        div.className = "slide";
        let body = "";
        if (s.layout === "two_column") {
          body = `<div class="cols"><ul>${(s.bullets || []).map((b) => `<li>${esc(b)}</li>`).join("")}</ul>`
               + `<ul>${(s.right_bullets || []).map((b) => `<li>${esc(b)}</li>`).join("")}</ul></div>`;
        } else if ((s.bullets || []).length) {
          body = `<ul>${s.bullets.map((b) => `<li>${esc(b)}</li>`).join("")}</ul>`;
        }
        const notes = s.speaker_notes ? `<div class="notes">🗣 ${esc(s.speaker_notes)}</div>` : "";
        div.innerHTML = `<span class="badge">${i + 1} · ${esc(s.layout)}</span>`
                      + `<h3>${esc(s.title)}</h3>${body}${notes}`;
        el.appendChild(div);
      });
    }

    async function generate() {
      const text = $("input").value.trim();
      if (!text) { setStatus("수업 내용을 입력하세요.", true); return; }
      $("genBtn").disabled = true;
      $("dlBtn").disabled = true;
      setStatus("Claude가 슬라이드를 정리하는 중... (수십 초 걸릴 수 있어요)");
      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ lecture_text: text, max_slides: Number($("maxSlides").value) }),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        currentDeck = await res.json();
        renderDeck(currentDeck);
        setStatus(`슬라이드 ${currentDeck.slides.length}장 생성 완료.`);
        $("dlBtn").disabled = false;
      } catch (e) {
        setStatus("오류: " + e.message, true);
      } finally {
        $("genBtn").disabled = false;
      }
    }

    async function download() {
      if (!currentDeck) return;
      $("dlBtn").disabled = true;
      setStatus(".pptx 파일을 만드는 중...");
      try {
        const res = await fetch("/api/pptx", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(currentDeck),
        });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = (currentDeck.title || "lecture") + ".pptx";
        a.click();
        URL.revokeObjectURL(url);
        setStatus("다운로드 완료.");
      } catch (e) {
        setStatus("오류: " + e.message, true);
      } finally {
        $("dlBtn").disabled = false;
      }
    }

    function setStatus(msg, err) {
      const el = $("status");
      el.textContent = msg;
      el.className = "status" + (err ? " err" : "");
    }

    $("genBtn").addEventListener("click", generate);
    $("dlBtn").addEventListener("click", download);
  </script>
</body>
</html>
